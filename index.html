<!DOCTYPE html>

<html>
<head>
  <title>AI Safety Path Predictor</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    body { margin:0; font-family: Arial; }
    #map { height: 90vh; }

    .controls {
      padding:10px;
      background:#f4f4f4;
      display:flex;
      gap:10px;
      flex-wrap: wrap;
    }

    input, button {
      padding:8px;
      font-size:14px;
    }

    button {
      background:#007BFF;
      color:white;
      border:none;
      cursor:pointer;
    }

    #score {
      font-weight:bold;
      color:green;
    }
  </style>
</head>
  <body>
<div class="controls">
  <input type="text" id="start" placeholder="Start (lat,lng)">
  <input type="text" id="end" placeholder="End (lat,lng)">
  <button onclick="findRoute()">Find Safe Route</button>
  <span id="score"></span>
</div>
<div id="map"></div>
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  // Initialize map (Hyderabad default)
  var map = L.map('map').setView([17.3850, 78.4867], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  var routeLine;

  // Dummy danger zones
  const dangerZones = [
    { lat:17.385, lng:78.486, risk:8 },
    { lat:17.395, lng:78.480, risk:6 },
    { lat:17.400, lng:78.490, risk:7 }
  ];

  // Show danger zones
  dangerZones.forEach(zone => {
    L.circle([zone.lat, zone.lng], {
      color:'red',
      radius:200
    }).addTo(map);
  });

  // Safety calculation
  function calculateSafety(routeCoords) {
    let risk = 0;

    routeCoords.forEach(point => {
      dangerZones.forEach(zone => {
        let dist = map.distance(point, [zone.lat, zone.lng]);
        if (dist < 300) {
          risk += zone.risk;
        }
      });
    });

    return Math.max(0, 100 - risk);
  }

  // Find route
  async function findRoute() {
    const startInput = document.getElementById("start").value.split(",");
    const endInput = document.getElementById("end").value.split(",");

    const start = [parseFloat(startInput[0]), parseFloat(startInput[1])];
    const end = [parseFloat(endInput[0]), parseFloat(endInput[1])];

    if(routeLine) map.removeLayer(routeLine);

    const url = `https://router.project-osrm.org/route/v1/driving/${start[1]},${start[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`;

    const res = await fetch(url);
    const data = await res.json();

    const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);

    // Draw route
    routeLine = L.polyline(coords, {color:'blue'}).addTo(map);
    map.fitBounds(routeLine.getBounds());

    // Calculate safety score
    let score = calculateSafety(coords);

    document.getElementById("score").innerText = "Safety Score: " + score + "%";
  }
</script>
</body>
</html>
:::
