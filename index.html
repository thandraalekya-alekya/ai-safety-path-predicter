<!DOCTYPE html>
<html>
<head>
<title>AI Safety Path Predictor</title>

<style>
body {
  font-family: Arial;
  background:#f4f6f8;
  margin:0;
}

.container {
  max-width:500px;
  margin:50px auto;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2 {
  text-align:center;
}

input, button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  background:#007BFF;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#result {
  margin-top:15px;
  padding:10px;
  border-radius:6px;
  text-align:center;
  font-size:18px;
}
.safe {
  color:green;
}
.risky {
  color:red;
}
</style>
</head>

<body>

<div class="container">
  <h2>AI Safety Path Predictor</h2>

  <input id="start" placeholder="Enter Start Location">
  <input id="end" placeholder="Enter Destination">

  <button onclick="predict()">Check Safety</button>

  <div id="result">Enter locations and click button</div>
</div>

<script>
function predict(){
  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;

  if(start === "" || end === ""){
    alert("Please enter both locations");
    return;
  }

  // simple AI logic (demo)
  let score = Math.floor(Math.random() * 100);

  let resultText = "";
  if(score > 70){
    resultText = "Safe Route ✅";
    document.getElementById("result").className = "safe";
  } else {
    resultText = "Risky Route ⚠️";
    document.getElementById("result").className = "risky";
  }

  document.getElementById("result").innerHTML =
    "Safety Score: " + score + "%<br>" + resultText;
}
</script>

</body>
</html>
